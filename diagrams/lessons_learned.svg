<text text-anchor="middle" x="202.25" y="-71.2" font-family="Helvetica,sans-Serif" font-size="11.00">Takeaways</text>
<text text-anchor="middle" x="202.25" y="-59.2" font-family="Helvetica,sans-Serif" font-size="11.00">• env&#45;python3 shebang has no opinion on interpreter — you must</text>
<text text-anchor="middle" x="202.25" y="-47.2" font-family="Helvetica,sans-Serif" font-size="11.00">• read requires&#45;python first; version mismatch isn&#39;t pip&#45;fixable</text>
<text text-anchor="middle" x="202.25" y="-35.2" font-family="Helvetica,sans-Serif" font-size="11.00">• install the project, not its imports</text>
<text text-anchor="middle" x="202.25" y="-23.2" font-family="Helvetica,sans-Serif" font-size="11.00">• prefer repo&#45;local .venv over shared</text>
<text text-anchor="middle" x="202.25" y="-11.2" font-family="Helvetica,sans-Serif" font-size="11.00">• triage warnings before chasing</text>
</g>
