<text text-anchor="middle" x="333.25" y="-271.2" font-family="Helvetica,sans-Serif" font-size="11.00">THE FIX — dedicated repo&#45;local venv on Python 3.12</text>
<text text-anchor="middle" x="333.25" y="-259.2" font-family="Helvetica,sans-Serif" font-size="11.00">python3.12 &#45;m venv .venv</text>
<text text-anchor="middle" x="333.25" y="-247.2" font-family="Helvetica,sans-Serif" font-size="11.00">.venv/bin/python &#45;m pip install &#45;&#45;upgrade pip</text>
<text text-anchor="middle" x="333.25" y="-235.2" font-family="Helvetica,sans-Serif" font-size="11.00">.venv/bin/python &#45;m pip install &#45;e . &#160;&#160;(resolves ALL deps)</text>
</g>
