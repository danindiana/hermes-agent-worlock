<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0f1a"/>
      <stop offset="0.55" stop-color="#1a1430"/>
      <stop offset="1" stop-color="#0a1a14"/>
    </linearGradient>
    <linearGradient id="wing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7a3fb4"/>
      <stop offset="1" stop-color="#1f8b5a"/>
    </linearGradient>
    <linearGradient id="rod" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe9c9"/>
      <stop offset="1" stop-color="#b4791f"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#c9d4f7"/>
      <stop offset="1" stop-color="#9ad9bd"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1f8b5a" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#1f8b5a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>
  <rect x="2" y="2" width="1196" height="316" rx="26" fill="none" stroke="#2c2c44" stroke-width="2"/>

  <!-- faint circuit grid -->
  <g stroke="#2a3550" stroke-width="1" opacity="0.35">
    <path d="M60 40 H180 V90 H120" fill="none"/>
    <path d="M1140 280 H1020 V230 H1080" fill="none"/>
    <circle cx="180" cy="40" r="3" fill="#2a3550"/>
    <circle cx="1020" cy="280" r="3" fill="#2a3550"/>
    <path d="M60 250 H140" fill="none"/>
    <path d="M1140 70 H1060" fill="none"/>
  </g>

  <!-- caduceus emblem -->
  <g transform="translate(160,160)">
    <circle cx="0" cy="0" r="120" fill="url(#halo)"/>
    <g filter="url(#glow)">
      <!-- central rod -->
      <rect x="-5" y="-92" width="10" height="184" rx="5" fill="url(#rod)"/>
      <!-- top ball -->
      <circle cx="0" cy="-96" r="11" fill="#ffe9c9"/>
      <!-- wings -->
      <path d="M0 -70 C -34 -96, -78 -92, -96 -64 C -64 -74, -30 -66, 0 -52 Z" fill="url(#wing)"/>
      <path d="M0 -70 C  34 -96,  78 -92,  96 -64 C  64 -74,  30 -66, 0 -52 Z" fill="url(#wing)"/>
      <!-- twin serpents -->
      <path d="M0 -54 C -42 -36, 42 -6, 0 14 C -42 34, 42 64, 0 86" fill="none" stroke="#1f8b5a" stroke-width="9" stroke-linecap="round"/>
      <path d="M0 -54 C  42 -36, -42 -6, 0 14 C  42 34, -42 64, 0 86" fill="none" stroke="#7a3fb4" stroke-width="9" stroke-linecap="round"/>
      <circle cx="-30" cy="-46" r="5" fill="#1f8b5a"/>
      <circle cx="30" cy="-46" r="5" fill="#7a3fb4"/>
    </g>
  </g>

  <!-- wordmark -->
  <g transform="translate(330,0)">
    <text x="0" y="150" font-size="78" font-weight="800" fill="url(#title)" letter-spacing="1">HERMES&#160;AGENT</text>
    <text x="2" y="200" font-size="34" font-weight="600" fill="#1f8b5a" letter-spacing="6">W&#8202;O&#8202;R&#8202;L&#8202;O&#8202;C&#8202;K</text>
    <text x="330" y="199" font-size="22" font-weight="400" fill="#8a8aa6">bare-metal&#160;deployment</text>

    <!-- spec chips -->
    <g font-size="20" font-weight="600">
      <g transform="translate(0,238)">
        <rect width="186" height="38" rx="19" fill="#1a1430" stroke="#7a3fb4" stroke-width="1.5"/>
        <text x="20" y="26" fill="#c9b3e6">Ollama&#160;/v1&#160;local</text>
      </g>
      <g transform="translate(202,238)">
        <rect width="220" height="38" rx="19" fill="#0a1a14" stroke="#1f8b5a" stroke-width="1.5"/>
        <text x="20" y="26" fill="#9ad9bd">RTX&#160;5080&#160;+&#160;3080</text>
      </g>
      <g transform="translate(438,238)">
        <rect width="158" height="38" rx="19" fill="#1a1812" stroke="#b4791f" stroke-width="1.5"/>
        <text x="20" y="26" fill="#ffd9a3">Python&#160;3.12</text>
      </g>
    </g>
  </g>
</svg>
